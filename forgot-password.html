<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    PURPOSE:
    Forgot Password page.
    Allows users to request a password reset link via email.
    Connects to backend route: POST /api/auth/forgot-password
  -->

  <!-- META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PAGE TITLE -->
  <title>Forgot Password - Ticket Wizard</title>

  <!-- STYLES -->
  <link rel="stylesheet" href="style.css" />

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">

  <div class="checkout-container">

    <!-- HEADER -->
    <header class="checkout-header">
      <h1 class="title">Ticket Wizard</h1>

      <!-- BACK BUTTON -->
      <button
        type="button"
        class="back-btn"
        onclick="window.location.href='LoginSystem.html'"
      >
        <i data-lucide="chevron-left"></i>
        Back to Login
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="login-flow-content">

      <h2>Forgot Password</h2>

      <p class="subtitle">
        Enter your account email address and we’ll send you a password reset link.
      </p>

      <!-- FORGOT PASSWORD FORM -->
      <form id="forgot-password-form" novalidate>

        <!-- EMAIL INPUT -->
        <input
          type="email"
          id="forgot-email"
          name="email"
          placeholder="Email Address"
          autocomplete="email"
          required
        />

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="submit-btn primary-btn">
          Send Reset Link
        </button>

      </form>

    </main>

  </div>

  <!-- FRONTEND SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/page-init.js"></script>

  <!-- INITIALISE ICONS -->
  <script>
    lucide.createIcons();
  </script>

</body>
</html>

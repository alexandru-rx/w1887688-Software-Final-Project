<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    PURPOSE:
    Reset Password page.
    Allows users to set a new password using a reset token from email.
    Connects to backend route: POST /api/auth/reset-password
  -->

  <!-- META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PAGE TITLE -->
  <title>Reset Password - Ticket Wizard</title>

  <!-- STYLES -->
  <link rel="stylesheet" href="style.css" />

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">

  <div class="checkout-container">

    <!-- HEADER -->
    <header class="checkout-header">
      <h1 class="title">Ticket Wizard</h1>

      <button
        type="button"
        class="back-btn"
        onclick="window.location.href='LoginSystem.html'"
      >
        <i data-lucide="chevron-left"></i>
        Back to Login
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="login-flow-content">

      <h2>Reset Password</h2>

      <p class="subtitle">
        Enter your new password below.
      </p>

      <!-- RESET PASSWORD FORM -->
      <form id="reset-password-form" novalidate>

        <!-- NEW PASSWORD -->
        <input 
          type="password"
          id="new-password"
          name="password"
          placeholder="New Password"
          autocomplete="new-password"
          required
        />

        <!-- CONFIRM PASSWORD -->
        <input 
          type="password"
          id="confirm-password"
          name="confirmPassword"
          placeholder="Confirm Password"
          autocomplete="new-password"
          required
        />

        <!-- SUBMIT -->
        <button type="submit" class="submit-btn primary-btn">
          Reset Password
        </button>

      </form>

    </main>

  </div>

  <!-- FRONTEND SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/page-init.js"></script>

  <!-- INITIALISE ICONS -->
  <script>
    lucide.createIcons();
  </script>

</body>
</html>

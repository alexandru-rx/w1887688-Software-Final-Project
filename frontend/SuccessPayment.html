<!DOCTYPE html>
<html lang="en">
<head>
  <!-- META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PAGE TITLE -->
  <title>Payment Successful - Ticket Wizard</title>

  <!-- STYLES -->
  <link rel="stylesheet" href="style.css" />

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">

  <div class="checkout-container">

    <!-- HEADER -->
    <header class="checkout-header">
      <h1 class="title">Ticket Wizard</h1>
    </header>

    <!-- MAIN CONTENT -->
    <main class="login-flow-content">

      <h2>Payment Successful</h2>

      <p class="subtitle">
        Your order has been confirmed. Your QR tickets are shown below.
      </p>

      <!-- ORDER / TICKETS DISPLAY -->
      <div id="success-order-box" class="order-summary-card"></div>

      <!-- NAVIGATION BUTTON -->
      <button type="button" class="submit-btn primary-btn" id="view-events-btn">
        Go to Events
      </button>

    </main>

  </div>

  <!-- FRONTEND SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/help.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/page-init.js"></script>

  <!-- INITIALISE ICONS -->
  <script>
    lucide.createIcons();
  </script>

</body>
</html>

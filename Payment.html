<!DOCTYPE html>
<html lang="en">
<head>
  <!-- META -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PAGE TITLE -->
  <title>Payment - Ticket Wizard</title>

  <!-- STYLES -->
  <link rel="stylesheet" href="style.css" />

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="login-page">
  <div class="checkout-container">

    <!-- HEADER -->
    <header class="checkout-header">
      <h1 class="title">Ticket Wizard</h1>

      <button type="button" class="back-btn" id="back-to-checkout-btn">
        <i data-lucide="chevron-left"></i>
        Back
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="login-flow-content">

      <h2>Payment</h2>

      <p class="subtitle">
        Review your booking details below and continue to secure payment.
      </p>

      <!-- ORDER SUMMARY -->
      <section class="order-summary">
        <h3 class="summary-title">Order Summary</h3>
        <div id="payment-summary-body" class="summary-card"></div>
      </section>

      <!-- PAYMENT ACTION -->
      <button type="button" class="submit-btn done-button" id="confirm-payment-btn">
        Proceed to Stripe Checkout
      </button>

    </main>
  </div>

  <!-- FRONTEND SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/help.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/page-init.js"></script>

  <!-- INITIALISE ICONS -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
